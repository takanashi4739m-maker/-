{% verbatim %}
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>夏祭り屋台レジ｜練習モード（保存されません）</title>
<style>
  :root{
    --bg:#f4f1ea; --surface:#ffffff; --surface-2:#f4f2ec; --sunken:#efeae0;
    --ink:#1b2340; --muted:#6c675c; --line:#e5ddce;
    --accent:#1a8496; --accent-press:#146a7a; --accent-ink:#ffffff;
    --good:#1f9d63; --danger:#d6483b;
    --ban-a:#1a1f42; --ban-b:#232a55; --ban-c:#2b1e42;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(20,30,50,.08);
    --radius:16px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#10162a; --surface:#1a2138; --surface-2:#212a45; --sunken:#161d31;
    --ink:#eef1f7; --muted:#9aa2ba; --line:#2a3350;
    --accent-ink:#ffffff; --good:#37b177; --danger:#f0685a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 26px rgba(0,0,0,.4);
  }}
  :root[data-theme="light"]{
    --bg:#f4f1ea; --surface:#ffffff; --surface-2:#f4f2ec; --sunken:#efeae0;
    --ink:#1b2340; --muted:#6c675c; --line:#e5ddce; --good:#1f9d63; --danger:#d6483b;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(20,30,50,.08);
  }
  :root[data-theme="dark"]{
    --bg:#10162a; --surface:#1a2138; --surface-2:#212a45; --sunken:#161d31;
    --ink:#eef1f7; --muted:#9aa2ba; --line:#2a3350; --good:#37b177; --danger:#f0685a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;}
  .app{
    max-width:460px; margin:0 auto; min-height:100%; color:var(--ink); background:var(--bg);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased; padding-bottom:40px;
  }
  .num{font-variant-numeric:tabular-nums;}

  /* practice ribbon */
  .practice{
    position:sticky; top:0; z-index:20; display:flex; gap:8px; align-items:center;
    background:#3a2f10; color:#ffe6a1; font-size:12px; font-weight:700;
    padding:8px 14px; border-bottom:1px solid #5a4a1a;
  }
  .practice .reset{
    margin-left:auto; font:inherit; font-size:11px; color:#3a2f10; background:#ffd873;
    border:none; border-radius:999px; padding:4px 11px; cursor:pointer;
  }

  /* banner */
  .banner{
    position:relative; padding:16px 18px 0; text-align:center; color:#fdf7ea; overflow:hidden;
    background:radial-gradient(120% 130% at 50% -20%, var(--ban-b) 0%, rgba(0,0,0,0) 60%),
      linear-gradient(178deg,var(--ban-a),var(--ban-b) 55%,var(--ban-c));
  }
  .switch{display:flex; gap:6px; justify-content:center; margin-bottom:14px;}
  .switch button{
    font:inherit; font-size:13px; font-weight:700; color:#dfe2f2; cursor:pointer;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16);
    padding:7px 12px; border-radius:999px; transition:background .15s, color .15s;
  }
  .switch button[aria-pressed="true"]{background:#fdf7ea; color:#1b2340; border-color:#fdf7ea;}
  .canopy{
    position:relative; background:#26305c; border-radius:14px 14px 0 0; margin:0 6px;
    padding:16px 10px 30px; box-shadow:inset 0 -1px rgba(255,255,255,.06);
  }
  .canopy::before{content:""; position:absolute; left:12px; right:12px; top:8px; height:5px; border-radius:3px; background:#7a5a2a;}
  .canopy .emoji{font-size:26px;}
  .canopy h1{margin:2px 0 0; font-size:21px; font-weight:800; letter-spacing:.04em;}

  /* tabs */
  .tabs{display:flex; gap:6px; padding:12px 14px 6px;}
  .tabs button{
    flex:1; font:inherit; font-size:13px; font-weight:700; cursor:pointer; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:10px 4px;
    transition:background .12s, color .12s, border-color .12s;
  }
  .tabs button[aria-selected="true"]{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}

  main{padding:6px 14px 0;}
  .sub{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:700; margin:8px 2px 12px;}

  /* sale grid */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .prod{
    position:relative; text-align:left; cursor:pointer; font:inherit; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 12px 10px;
    transition:transform .06s, border-color .12s; box-shadow:var(--shadow);
  }
  .prod:active{transform:scale(.97);}
  .prod .pn{font-size:14px; font-weight:700;}
  .prod .pp{font-size:17px; font-weight:800; color:var(--accent); margin-top:2px;}
  .prod .ps{font-size:11px; color:var(--muted); margin-top:2px;}
  .prod .ps.low{color:var(--danger); font-weight:700;}
  .prod .qty{
    position:absolute; top:-8px; right:-8px; min-width:24px; height:24px; padding:0 6px;
    background:var(--danger); color:#fff; font-size:13px; font-weight:800; border-radius:999px;
    display:grid; place-items:center; box-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  /* cart bar */
  .cartbar{
    position:sticky; bottom:12px; margin:16px 0 0; background:var(--surface);
    border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:12px;
  }
  .cartbar .line{display:flex; justify-content:space-between; align-items:baseline; padding:2px 4px 10px;}
  .cartbar .cnt{font-size:12px; color:var(--muted); font-weight:700;}
  .cartbar .tot{font-size:26px; font-weight:800;}
  .cartbar .btns{display:flex; gap:10px;}
  .btn{font:inherit; font-weight:800; cursor:pointer; border-radius:12px; border:1px solid var(--line); padding:14px; background:var(--surface-2); color:var(--ink);}
  .btn.wide{flex:1;}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-size:16px;}
  .btn.primary:disabled{opacity:.45; cursor:not-allowed;}
  .btn.ghost{flex:none; width:64px; color:var(--muted);}

  /* keypad */
  .amount{background:var(--sunken); border:1px solid var(--line); border-radius:14px; text-align:center; padding:16px; margin-bottom:12px;}
  .amount .lb{font-size:11px; color:var(--muted); font-weight:700; letter-spacing:.1em;}
  .amount .v{font-size:34px; font-weight:800;}
  .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  .keys button{font:inherit; font-size:20px; font-weight:700; cursor:pointer; padding:16px 0; border-radius:12px; border:1px solid var(--line); background:var(--surface); color:var(--ink);}
  .keys button:active{background:var(--surface-2);}
  .chips{display:flex; gap:8px; margin:14px 0 10px; flex-wrap:wrap;}
  .chips button{font:inherit; font-size:13px; font-weight:700; cursor:pointer; padding:8px 14px; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--ink);}
  .chips button[aria-pressed="true"]{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .memo{width:100%; font:inherit; font-size:14px; padding:11px 13px; border-radius:12px; border:1px solid var(--line); background:var(--surface); color:var(--ink); margin-bottom:12px;}

  /* stock */
  .stock{display:flex; flex-direction:column; gap:10px;}
  .srow{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 13px; box-shadow:var(--shadow);}
  .srow .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .srow .nm{font-size:15px; font-weight:700;}
  .srow .cur{font-size:13px; color:var(--muted); font-weight:700;}
  .srow .cur b{font-size:19px; color:var(--ink); margin-left:4px;}
  .stepper{display:flex; align-items:center; gap:8px;}
  .stepper .sb{width:38px; height:38px; font:inherit; font-size:20px; font-weight:800; cursor:pointer; border-radius:10px; border:1px solid var(--line); background:var(--surface-2); color:var(--ink);}
  .stepper input, .fix input{width:56px; text-align:center; font:inherit; font-size:16px; padding:8px 4px; border-radius:10px; border:1px solid var(--line); background:var(--surface); color:var(--ink);}
  .srow .acts{display:flex; gap:8px; margin-top:8px;}
  .srow .acts .btn{flex:1; padding:11px; font-size:13px;}
  .srow .acts .btn.refill{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .fix{display:flex; align-items:center; gap:8px;}

  /* history */
  .hist{display:flex; flex-direction:column; gap:9px;}
  .hrow{display:flex; align-items:center; gap:11px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:11px 12px; box-shadow:var(--shadow);}
  .hrow .ic{width:38px; height:38px; flex:none; display:grid; place-items:center; border-radius:10px; background:var(--surface-2); font-size:18px;}
  .hrow .txt{flex:1; min-width:0;}
  .hrow .t1{font-size:14px; font-weight:700;}
  .hrow .t2{font-size:11px; color:var(--muted);}
  .hrow .cancel{font:inherit; font-size:13px; font-weight:700; cursor:pointer; color:var(--danger); background:transparent; border:1px solid var(--danger); border-radius:10px; padding:8px 12px;}
  .empty{text-align:center; color:var(--muted); font-size:13px; padding:34px 10px;}

  /* dashboard */
  .hero{background:linear-gradient(160deg,#26305c,#1c2450); color:#fdf7ea; border-radius:16px; padding:16px; margin-bottom:12px;}
  .hero .lb{font-size:12px; opacity:.8; font-weight:700;}
  .hero .big{font-size:32px; font-weight:800;}
  .hero .meta{font-size:12px; opacity:.85; margin-top:2px;}
  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .tile{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 13px; box-shadow:var(--shadow);}
  .tile .lb{font-size:11px; color:var(--muted); font-weight:700;}
  .tile .v{font-size:20px; font-weight:800; margin-top:2px;}
  .tile .v.good{color:var(--good);}
  .bars{display:flex; flex-direction:column; gap:12px;}
  .bar .top{display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:5px;}
  .bar .track{height:9px; background:var(--sunken); border-radius:6px; overflow:hidden;}
  .bar .fill{height:100%; border-radius:6px; transition:width .4s ease;}

  /* toast */
  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--good); color:#fff; font-weight:800; font-size:14px; padding:11px 20px;
    border-radius:999px; box-shadow:0 8px 24px rgba(0,0,0,.25); opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; z-index:40;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>

<div class="app">
  <div class="practice">
    <span>🧪 練習モード</span>
    <span style="font-weight:400;opacity:.85;">入力しても保存されません（再読み込みで消えます）</span>
    <button class="reset" id="resetBtn" type="button">リセット</button>
  </div>

  <header class="banner">
    <div class="switch" id="switch"></div>
    <div class="canopy">
      <div class="emoji" id="banEmoji">🍺</div>
      <h1 id="banName">ドリンク</h1>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>
</div>
<div id="toast"></div>

<script>
(function(){
  const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
  const now = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };

  const SEED = {
    drink:{ name:"ドリンク", emoji:"🍺", accent:"#1a8496", press:"#146a7a", products:[
      {id:"d1",name:"生ビール",price:400,stock:93},
      {id:"d2",name:"酎ハイ",price:300,stock:100},
      {id:"d3",name:"ハイボール",price:300,stock:100},
      {id:"d4",name:"缶ジュース¥100",price:100,stock:80},
      {id:"d5",name:"缶ジュース¥120",price:120,stock:80},
      {id:"d6",name:"缶ジュース¥150",price:150,stock:80},
    ]},
    shateki:{ name:"射的", emoji:"🎯", accent:"#cf3f2c", press:"#b23423", products:[
      {id:"s1",name:"射的 1回",price:300,stock:100},
      {id:"s2",name:"射的 3回",price:800,stock:40},
      {id:"s3",name:"特上景品",price:500,stock:20},
    ]},
    keishoku:{ name:"軽食", emoji:"🍘", accent:"#b5651d", press:"#975316", products:[
      {id:"k1",name:"焼きそば",price:400,stock:60},
      {id:"k2",name:"たこ焼き",price:400,stock:60},
      {id:"k3",name:"フランクフルト",price:300,stock:80},
      {id:"k4",name:"かき氷",price:200,stock:100},
    ]},
  };
  const ORDER = ["drink","shateki","keishoku"];
  const CATS = ["仕入れ","備品・消耗品","その他"];

  let stalls, records, cart, cur, tab, expAmt, expCat, expMemo, uid;
  function reset(showToast){
    stalls = structuredClone(SEED);
    records = []; cart = {}; cur = "drink"; tab = "sale";
    expAmt = ""; expCat = CATS[0]; expMemo = ""; uid = 1;
    renderAll();
    if(showToast) toast("練習データをリセットしました");
  }

  const view = document.getElementById("view");
  const toastEl = document.getElementById("toast");
  let toastT;
  function toast(msg, color){
    toastEl.textContent = msg;
    toastEl.style.background = color || "var(--good)";
    toastEl.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"), 1600);
  }

  function setAccent(){
    document.querySelector(".app").style.setProperty("--accent", stalls[cur].accent);
    document.querySelector(".app").style.setProperty("--accent-press", stalls[cur].press);
  }

  function renderSwitch(){
    document.getElementById("switch").innerHTML = ORDER.map(k=>
      `<button type="button" data-stall="${k}" aria-pressed="${k===cur}">${SEED[k].emoji}${SEED[k].name}</button>`).join("");
  }
  function renderBanner(){
    document.getElementById("banEmoji").textContent = stalls[cur].emoji;
    document.getElementById("banName").textContent = stalls[cur].name;
  }
  const TABS = [["sale","売上"],["expense","経費"],["stock","在庫"],["history","履歴"],["guide","使い方"],["dash","全体"]];
  function renderTabs(){
    document.getElementById("tabs").innerHTML = TABS.map(([k,l])=>
      `<button type="button" data-tab="${k}" aria-selected="${k===tab}">${l}</button>`).join("");
  }

  function renderAll(){ setAccent(); renderSwitch(); renderBanner(); renderTabs(); renderView(); }

  function renderView(){
    if(tab==="sale") return renderSale();
    if(tab==="expense") return renderExpense();
    if(tab==="stock") return renderStock();
    if(tab==="history") return renderHistory();
    if(tab==="guide") return renderGuide();
    if(tab==="dash") return renderDash();
  }

  function renderGuide(){
    const s = stalls[cur];
    view.innerHTML = `<div class="sub">使い方 ・ ${s.name}</div>
      <ul class="tips">
        <li><span class="k">売上</span><span>上の<b>「売上」</b>で商品ボタンを<b>タップ</b>して合計に足し、<b>「記録する」</b>で確定。まとめて何点でもOK。</span></li>
        <li><span class="k">経費</span><span><b>「経費」</b>で仕入れなどの金額を電卓入力 → カテゴリを選んで記録。</span></li>
        <li><span class="k">在庫</span><span><b>「在庫」</b>で開始個数の設定・補充・実数への修正ができます。売れると残数が自動で減ります。</span></li>
        <li><span class="k">取消</span><span>押し間違えたら<b>「履歴」→「取消」</b>でその場で取り消せます（売上なら在庫も戻ります）。</span></li>
        <li><span class="k">全体</span><span><b>「全体」</b>で全屋台の売上・純利益をまとめて確認できます。</span></li>
      </ul>
      <div class="empty" style="padding:16px 12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;">🧪 これは<b>練習用</b>です。入力しても保存されず、ページを再読み込みすると消えます。<br>上の <b>🍺 🎯 🍘</b> ボタンで屋台を切り替えられます。</div>`;
  }

  function renderSale(){
    const ps = stalls[cur].products;
    let cnt=0, tot=0;
    for(const id in cart){ const p=ps.find(x=>x.id===id); if(p){ cnt+=cart[id]; tot+=cart[id]*p.price; } }
    const cards = ps.map(p=>{
      const q = cart[p.id]||0;
      const low = p.stock<=10;
      return `<button class="prod" type="button" data-add="${p.id}">
        ${q>0?`<span class="qty num">${q}</span>`:""}
        <div class="pn">${p.name}</div>
        <div class="pp num">${yen(p.price)}</div>
        <div class="ps num ${low?"low":""}">残 ${p.stock}</div>
      </button>`;
    }).join("");
    view.innerHTML = `<div class="sub">売上入力 ・ ${stalls[cur].name}</div>
      <div class="grid">${cards}</div>
      <div class="cartbar">
        <div class="line"><span class="cnt num">${cnt}点</span><span class="tot num">${yen(tot)}</span></div>
        <div class="btns">
          <button class="btn ghost" type="button" data-clearcart ${cnt?"":"disabled"}>取消</button>
          <button class="btn primary wide" type="button" data-record ${cnt?"":"disabled"}>記録する</button>
        </div>
      </div>`;
  }

  function renderExpense(){
    const val = expAmt===""?0:parseInt(expAmt,10);
    view.innerHTML = `<div class="sub">経費・仕入れ入力 ・ ${stalls[cur].name}</div>
      <div class="amount"><div class="lb">金額</div><div class="v num">${yen(val)}</div></div>
      <div class="keys">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button type="button" data-key="${n}">${n}</button>`).join("")}
        <button type="button" data-key="00">00</button>
        <button type="button" data-key="0">0</button>
        <button type="button" data-key="del">⌫</button>
      </div>
      <div class="chips">${CATS.map(c=>`<button type="button" data-cat="${c}" aria-pressed="${c===expCat}">${c}</button>`).join("")}</div>
      <input class="memo" id="memoInput" placeholder="メモ（任意）" value="${expMemo.replace(/"/g,"&quot;")}">
      <button class="btn primary" style="width:100%;font-size:16px;" type="button" data-exprecord ${val>0?"":"disabled"}>記録する</button>`;
  }

  function renderStock(){
    const rows = stalls[cur].products.map(p=>`
      <div class="srow">
        <div class="top"><span class="nm">${p.name}</span><span class="cur">現在<b class="num">${p.stock}</b></span></div>
        <div class="acts">
          <div class="stepper">
            <button class="sb" type="button" data-step="dec" data-id="${p.id}">−</button>
            <input class="num" type="number" min="1" value="1" id="ref_${p.id}">
            <button class="sb" type="button" data-step="inc" data-id="${p.id}">＋</button>
          </div>
          <button class="btn refill" type="button" data-refill="${p.id}">補充する</button>
        </div>
        <div class="acts">
          <div class="fix"><input class="num" type="number" min="0" placeholder="${p.stock}" id="fix_${p.id}"></div>
          <button class="btn" type="button" data-fix="${p.id}">実数に修正</button>
        </div>
      </div>`).join("");
    view.innerHTML = `<div class="sub">在庫・残り個数 ・ ${stalls[cur].name}</div><div class="stock">${rows}</div>`;
  }

  function renderHistory(){
    const rs = records.filter(r=>r.stall===cur).slice().reverse();
    if(!rs.length){ view.innerHTML = `<div class="sub">履歴・取消 ・ ${stalls[cur].name}</div><div class="empty">まだ記録がありません。<br>売上や経費を入力すると、ここに出ます。</div>`; return; }
    const rows = rs.map(r=>{
      const isSale = r.type==="sale";
      const t1 = isSale ? `${yen(r.amount)} の売上（${r.count}点）` : `${yen(r.amount)} の経費 ・ ${r.category}`;
      return `<div class="hrow">
        <div class="ic">${isSale?"🛒":"🧾"}</div>
        <div class="txt"><div class="t1 num">${t1}</div><div class="t2">${r.time}${r.memo?" ・ "+escapeHtml(r.memo):""}</div></div>
        <button class="cancel" type="button" data-cancel="${r.id}">取消</button>
      </div>`;
    }).join("");
    view.innerHTML = `<div class="sub">履歴・取消 ・ ${stalls[cur].name}</div><div class="hist">${rows}</div>`;
  }

  function renderDash(){
    let sales=0, exp=0, cnt=0;
    const per = {};
    ORDER.forEach(k=>per[k]=0);
    records.forEach(r=>{
      if(r.type==="sale"){ sales+=r.amount; cnt++; per[r.stall]+=r.amount; }
      else exp+=r.amount;
    });
    const net = sales-exp;
    const max = Math.max(1, ...ORDER.map(k=>per[k]));
    const bars = ORDER.map(k=>`
      <div class="bar">
        <div class="top"><span>${SEED[k].emoji}${SEED[k].name}</span><span class="num">${yen(per[k])}</span></div>
        <div class="track"><div class="fill" style="width:${Math.round(per[k]/max*100)}%;background:${SEED[k].accent};"></div></div>
      </div>`).join("");
    view.innerHTML = `<div class="sub">全体ダッシュボード ・ 練習</div>
      <div class="hero"><div class="lb">全屋台 売上合計</div><div class="big num">${yen(sales)}</div><div class="meta num">会計 ${cnt}件 ・ 純利益 ${yen(net)}</div></div>
      <div class="tiles">
        <div class="tile"><div class="lb">経費合計</div><div class="v num">${yen(exp)}</div></div>
        <div class="tile"><div class="lb">純利益（売上−経費）</div><div class="v good num">${yen(net)}</div></div>
      </div>
      <div class="sub">屋台ごとの売上</div>
      <div class="bars">${bars}</div>`;
  }

  function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  // ---- interactions ----
  document.getElementById("switch").addEventListener("click", e=>{
    const b=e.target.closest("[data-stall]"); if(!b) return;
    cur=b.dataset.stall; cart={}; tab="sale"; renderAll();
  });
  document.getElementById("tabs").addEventListener("click", e=>{
    const b=e.target.closest("[data-tab]"); if(!b) return;
    tab=b.dataset.tab; renderView();
    document.querySelectorAll("#tabs button").forEach(x=>x.setAttribute("aria-selected", x.dataset.tab===tab));
  });
  document.getElementById("resetBtn").addEventListener("click", ()=>reset(true));

  view.addEventListener("click", e=>{
    const ps = stalls[cur].products;
    let t;
    if(t=e.target.closest("[data-add]")){ const id=t.dataset.add; const p=ps.find(x=>x.id===id);
      if((cart[id]||0) >= p.stock){ toast("在庫が足りません", "var(--danger)"); return; }
      cart[id]=(cart[id]||0)+1; renderSale(); return; }
    if(e.target.closest("[data-clearcart]")){ cart={}; renderSale(); return; }
    if(e.target.closest("[data-record]")){ recordSale(); return; }

    if(t=e.target.closest("[data-key]")){ pressKey(t.dataset.key); return; }
    if(t=e.target.closest("[data-cat]")){ expCat=t.dataset.cat; renderExpense(); return; }
    if(e.target.closest("[data-exprecord]")){ recordExpense(); return; }

    if(t=e.target.closest("[data-step]")){ const inp=document.getElementById("ref_"+t.dataset.id);
      let v=parseInt(inp.value||"1",10); v=t.dataset.step==="inc"?v+1:Math.max(1,v-1); inp.value=v; return; }
    if(t=e.target.closest("[data-refill]")){ const p=ps.find(x=>x.id===t.dataset.refill);
      const n=parseInt(document.getElementById("ref_"+p.id).value||"0",10); if(n>0){ p.stock+=n; renderStock(); toast(`${p.name} を +${n} 補充`); } return; }
    if(t=e.target.closest("[data-fix]")){ const p=ps.find(x=>x.id===t.dataset.fix);
      const raw=document.getElementById("fix_"+p.id).value; if(raw==="") return; const n=Math.max(0,parseInt(raw,10)||0); p.stock=n; renderStock(); toast(`${p.name} を ${n} に修正`); return; }

    if(t=e.target.closest("[data-cancel]")){ cancelRecord(parseInt(t.dataset.cancel,10)); return; }
  });
  view.addEventListener("input", e=>{ if(e.target.id==="memoInput") expMemo=e.target.value; });

  function recordSale(){
    const ps = stalls[cur].products; let cnt=0, tot=0; const items=[];
    for(const id in cart){ const p=ps.find(x=>x.id===id); if(p&&cart[id]>0){ cnt+=cart[id]; tot+=cart[id]*p.price; items.push({id,qty:cart[id]}); } }
    if(!cnt) return;
    items.forEach(it=>{ const p=ps.find(x=>x.id===it.id); p.stock=Math.max(0,p.stock-it.qty); });
    records.push({id:uid++, stall:cur, type:"sale", amount:tot, count:cnt, items, time:now()});
    cart={}; renderSale(); toast(`${yen(tot)} を記録しました`);
  }
  function pressKey(k){
    if(k==="del") expAmt=expAmt.slice(0,-1);
    else if(k==="00"){ if(expAmt!=="") expAmt=(expAmt+"00").slice(0,9); }
    else { if(!(expAmt===""&&k==="0")) expAmt=(expAmt+k).slice(0,9); }
    renderExpense();
  }
  function recordExpense(){
    const val = expAmt===""?0:parseInt(expAmt,10); if(val<=0) return;
    records.push({id:uid++, stall:cur, type:"expense", amount:val, category:expCat, memo:expMemo, time:now()});
    expAmt=""; expMemo=""; renderExpense(); toast(`経費 ${yen(val)} を記録しました`);
  }
  function cancelRecord(id){
    const i = records.findIndex(r=>r.id===id); if(i<0) return;
    const r = records[i];
    if(r.type==="sale" && r.items){ const ps=stalls[r.stall].products; r.items.forEach(it=>{ const p=ps.find(x=>x.id===it.id); if(p) p.stock+=it.qty; }); }
    records.splice(i,1); renderHistory(); toast("取り消しました");
  }

  reset();
})();
</script>

</body>
</html>
